name: Test

on:
  push:
    branches: ["python"]
  pull_request:
    branches: ["python"]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install
      - run: uv sync
      - uses: astral-sh/ruff-action@v1
      - uses: jakebailey/pyright-action@v2
        with:
          pylance-version: latest-release
